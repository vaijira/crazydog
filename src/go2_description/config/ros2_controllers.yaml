# ros2_controllers.yaml
#
# Controller configuration for the Unitree Go2 in Gazebo simulation.
# Loaded by the gz_ros2_control plugin at launch time.
#
# We use a JointGroupPositionController for each leg independently so that
# you can command all 12 joints at once or per-leg as you prototype gaits.
# Swap to effort_controllers/JointGroupEffortController when you move to
# torque-controlled gaits.

controller_manager:
  ros__parameters:
    update_rate: 500  # Hz — must be ≤ Gazebo physics rate

    # Controllers to spin up at launch
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    go2_joint_controller:
      type: position_controllers/JointGroupPositionController

# -----------------------------------------------------------------------
# JointStateBroadcaster — publishes /joint_states from hardware interfaces
# -----------------------------------------------------------------------
joint_state_broadcaster:
  ros__parameters: {}

# -----------------------------------------------------------------------
# go2_joint_controller — accepts position targets for all 12 joints
# Subscribes to: /go2_joint_controller/commands  (Float64MultiArray)
# Joint order (must match the URDF joint_interface order):
#   0  FL_hip    1  FL_thigh   2  FL_calf
#   3  FR_hip    4  FR_thigh   5  FR_calf
#   6  RL_hip    7  RL_thigh   8  RL_calf
#   9  RR_hip   10  RR_thigh  11  RR_calf
# -----------------------------------------------------------------------
go2_joint_controller:
  ros__parameters:
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
